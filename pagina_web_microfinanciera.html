<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microfinanciera Impulsa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Hero / Llamado a la acción -->
  <section class="bg-green-600 text-white text-center py-20">
    <h1 class="text-4xl font-bold mb-4">Impulsa tu futuro financiero</h1>
    <p class="mb-6">Créditos rápidos y accesibles para emprendedores como tú</p>
    <a href="#contacto" class="bg-white text-green-600 px-6 py-3 rounded-full font-semibold">Solicita tu crédito</a>
  </section>

  <!-- Calculadora de crédito -->
  <section class="py-16 px-6 text-center">
    <h2 class="text-3xl font-bold mb-8">Calcula tu crédito</h2>
    <div class="max-w-xl mx-auto bg-white p-6 rounded-2xl shadow space-y-4">
      <input id="monto" type="number" placeholder="Monto del préstamo" class="w-full p-3 border rounded-lg">
      <input id="tasa" type="number" placeholder="Tasa de interés mensual (%)" class="w-full p-3 border rounded-lg">
      <input id="tiempo" type="number" placeholder="Meses" class="w-full p-3 border rounded-lg">
      <button onclick="calcular()" class="w-full bg-green-600 text-white p-3 rounded-lg">Calcular</button>
      <p id="resultado" class="font-bold text-lg"></p>
    </div>
  </section>

  <!-- Formulario de contacto -->
  <section id="contacto" class="bg-white py-16 px-6">
    <h2 class="text-3xl font-bold text-center mb-8">Contáctanos</h2>
    <form class="max-w-xl mx-auto space-y-4">
      <input type="text" placeholder="Nombre" class="w-full p-3 border rounded-lg" required>
      <input type="email" placeholder="Correo electrónico" class="w-full p-3 border rounded-lg" required>
      <input type="tel" placeholder="Teléfono" class="w-full p-3 border rounded-lg">
      <textarea placeholder="Mensaje" class="w-full p-3 border rounded-lg"></textarea>
      <button type="submit" class="w-full bg-green-600 text-white p-3 rounded-lg font-semibold">Enviar</button>
    </form>
  </section>

  <!-- Instagram -->
  <section class="py-12 text-center">
    <h2 class="text-2xl font-bold mb-4">Síguenos en Instagram</h2>
    <a href="https://instagram.com/tu_perfil" target="_blank" class="text-green-600 font-semibold">@tu_perfil</a>
  </section>

  <!-- Chatbot -->
  <div class="fixed bottom-5 right-5">
    <button onclick="toggleChat()" class="bg-green-600 text-white p-4 rounded-full">💬</button>
    <div id="chatbox" class="hidden bg-white w-72 h-96 shadow-lg rounded-xl mt-2 flex flex-col">
      <div class="bg-green-600 text-white p-3 rounded-t-xl">Asistente</div>
      <div id="chat" class="flex-1 p-3 overflow-y-auto text-sm"></div>
      <div class="p-2 flex">
        <input id="inputChat" type="text" class="flex-1 border rounded-lg p-2" placeholder="Escribe...">
        <button onclick="enviarMensaje()" class="bg-green-600 text-white px-3 ml-2 rounded-lg">Enviar</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white text-center py-6">
    <p>© 2026 Microfinanciera Impulsa - Todos los derechos reservados</p>
  </footer>

<script>
function calcular() {
  let monto = document.getElementById('monto').value;
  let tasa = document.getElementById('tasa').value / 100;
  let tiempo = document.getElementById('tiempo').value;

  let cuota = (monto * tasa) / (1 - Math.pow(1 + tasa, -tiempo));
  document.getElementById('resultado').innerText = 'Cuota mensual: $' + cuota.toFixed(2);
}

function toggleChat() {
  let chat = document.getElementById('chatbox');
  chat.classList.toggle('hidden');
}

function enviarMensaje() {
  let input = document.getElementById('inputChat');
  let chat = document.getElementById('chat');

  let userMsg = input.value;
  chat.innerHTML += '<p><b>Tú:</b> ' + userMsg + '</p>';

  let respuesta = '';

  if(userMsg.toLowerCase().includes('credito')) {
    respuesta = 'Ofrecemos microcréditos rápidos con pocos requisitos.';
  } else if(userMsg.toLowerCase().includes('requisitos')) {
    respuesta = 'Necesitas cédula, ingresos demostrables y buen historial.';
  } else {
    respuesta = 'Un asesor te contactará pronto.';
  }

  chat.innerHTML += '<p><b>Bot:</b> ' + respuesta + '</p>';
  input.value = '';
}
</script>

</body>
</html>
